# Настройка инфраструктурных параметров. Источник названий и синтаксиса:
# https://docs.spring.io/spring-boot/appendix/application-properties/index.html
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/logdb
    username: admin
    password: admin
  data:
    mongodb:
      uri: mongodb://admin:admin@localhost:27017/logdb?authSource=admin
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group
app:
  base-url: http://localhost:8081